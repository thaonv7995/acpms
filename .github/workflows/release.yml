name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: never

jobs:
  build-frontend:
    name: Build Frontend & Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Create frontend archive
        run: tar -czvf acpms-frontend-dist.tar.gz -C frontend/dist .

      - name: Pull community skills
        run: |
          echo "Cloning Anthropic community skills..."
          git clone --depth 1 https://github.com/anthropics/skills.git /tmp/anthropic-skills || true
          if [ -d /tmp/anthropic-skills/skills ]; then
            mkdir -p .acpms/skills/community-anthropic
            cp -r /tmp/anthropic-skills/skills/* .acpms/skills/community-anthropic/
            echo "✅ Anthropic skills copied: $(ls .acpms/skills/community-anthropic/ | wc -l) items"
          fi

          echo "Cloning OpenAI community skills..."
          git clone --depth 1 https://github.com/openai/skills.git /tmp/openai-skills || true
          if [ -d /tmp/openai-skills ]; then
            mkdir -p .acpms/skills/community-openai
            # Copy skill directories (skip non-skill files like README, LICENSE)
            for dir in /tmp/openai-skills/*/; do
              if [ -f "$dir/SKILL.md" ]; then
                cp -r "$dir" .acpms/skills/community-openai/
              fi
            done
            echo "✅ OpenAI skills copied: $(ls .acpms/skills/community-openai/ 2>/dev/null | wc -l) items"
          fi

          rm -rf /tmp/anthropic-skills /tmp/openai-skills

      - name: Create skills archive
        run: tar -czvf acpms-skills.tar.gz -C .acpms/skills .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: acpms-frontend-dist.tar.gz

      - name: Upload skills artifact
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: acpms-skills.tar.gz

  build-backend:
    name: Build Backend (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: acpms-server-linux-amd64
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: acpms-server-linux-arm64
            use-cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: acpms-server-macos-arm64
            use-cross: false
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: acpms-server-macos-amd64
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (Linux)
        if: matrix.use-cross
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross (Linux)
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup Rust (macOS)
        if: ${{ !matrix.use-cross }}
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS x86_64 target (cross-compile on ARM runner)
        if: ${{ !matrix.use-cross && matrix.target == 'x86_64-apple-darwin' }}
        run: rustup target add x86_64-apple-darwin

      - name: Build with cross (Linux)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p acpms-server

      - name: Build with cargo (macOS)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }} -p acpms-server

      - name: Copy binary to artifact name
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cp target/${{ matrix.target }}/release/acpms-server ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/acpms-server ${{ matrix.artifact }}
          fi

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          mv artifacts/frontend-dist/acpms-frontend-dist.tar.gz release/ 2>/dev/null || true
          mv artifacts/skills/acpms-skills.tar.gz release/ 2>/dev/null || true
          for d in artifacts/backend-*; do
            [ -d "$d" ] && mv "$d"/* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Create checksums
        run: |
          cd release
          sha256sum acpms-* 2>/dev/null | tee SHA256SUMS.txt || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/acpms-frontend-dist.tar.gz
            release/acpms-skills.tar.gz
            release/acpms-server-linux-amd64
            release/acpms-server-linux-arm64
            release/acpms-server-macos-amd64
            release/acpms-server-macos-arm64
            release/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
