<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="#0F172A" />
  
  <!-- Outer Ring segments -->
  <path d="M256 80C158.8 80 80 158.8 80 256C80 353.2 158.8 432 256 432" stroke="url(#gradient)" stroke-width="32" stroke-linecap="round" />
  <path d="M432 256C432 158.8 353.2 80 256 80" stroke="url(#gradient)" stroke-width="32" stroke-linecap="round" opacity="0.5" stroke-dasharray="20 40"/>

  <!-- Central "A" / Circuit shape -->
  <path d="M256 160L336 320H176L256 160Z" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="24" fill="#60A5FA" />
  <circle cx="176" cy="320" r="16" fill="#A78BFA" />
  <circle cx="336" cy="320" r="16" fill="#A78BFA" />
</svg>
