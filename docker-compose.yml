# Production: docker compose up -d  (postgres + minio only)
# Dev:       docker compose --profile dev up -d  (includes backend + frontend)
services:
  postgres:
    image: postgres:16-alpine
    container_name: acpms-postgres
    environment:
      POSTGRES_DB: acpms
      POSTGRES_USER: acpms_user
      POSTGRES_PASSWORD: acpms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acpms_user -d acpms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: acpms-backend
    environment:
      DATABASE_URL: postgres://acpms_user:acpms_password@postgres:5432/acpms
      JWT_SECRET: supersecretkey
      ENCRYPTION_KEY: F/RHdcgio1FUREm5/Ayuk4kVGY9bbOcGulPpT2xaoNQ=
      GITLAB_CLIENT_ID: placeholder-client-id
      GITLAB_CLIENT_SECRET: placeholder-client-secret
      GITLAB_REDIRECT_URI: http://localhost:3000/api/v1/auth/gitlab/callback
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      # Claude session directory (read-only mount)
      CLAUDE_SESSION_DIR: /root/.claude
      # Worktrees directory (absolute path for git worktree operations)
      WORKTREES_PATH: ${HOME}/Projects
      # MinIO S3
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000  # For presigned URLs
      S3_REGION: us-east-1
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: adminpassword123
      S3_BUCKET_NAME: acpms-media
    ports:
      - "3000:3000"
    volumes:
      - ./crates:/app/crates
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - target:/app/target
      # Mount Claude session directory (read-write for debug logs)
      # IMPORTANT: User must login locally via 'npx @anthropic-ai/claude-code' first
      - ${HOME}/.claude:/root/.claude
      # Mount Projects directory for agent worktrees (persistent storage)
      - ${HOME}/Projects:${HOME}/Projects
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: cargo run --bin acpms-server

  frontend:
    profiles:
      - dev
    image: node:20-alpine
    container_name: acpms-frontend
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: acpms-minio
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword123
      MINIO_DOMAIN: localhost
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  cargo_registry:
  cargo_git:
  target:
  frontend_node_modules:
  minio_data:
